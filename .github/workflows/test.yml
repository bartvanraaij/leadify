name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: LeadifyCore
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Run tests
        run: swift test
