name: iOS Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run unit tests
        run: xcodebuild test -scheme Leadify -destination 'platform=iOS Simulator,name=iPad (A16)' -only-testing:LeadifyTests CODE_SIGNING_ALLOWED=NO ENABLE_PREVIEWS=NO COMPILER_INDEX_STORE_ENABLE=NO
