name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select iPad simulator
        id: simulator
        run: |
          IPAD_NAME=$(xcrun simctl list devices available | grep -E '^\s+iPad' | head -1 | sed 's/^ *//' | sed 's/ (.*)//')
          if [ -z "$IPAD_NAME" ]; then
            echo "No iPad simulator found" >&2
            exit 1
          fi
          echo "name=$IPAD_NAME" >> "$GITHUB_OUTPUT"
          echo "destination=platform=iOS Simulator,name=$IPAD_NAME" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $IPAD_NAME"

      - name: Run unit tests
        run: |
          xcodebuild clean test \
            -scheme Leadify \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -only-testing:LeadifyTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Run UI tests
        # No 'clean' here — reuses the build artifact from the unit tests step
        run: |
          xcodebuild test \
            -scheme Leadify \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -only-testing:LeadifyUITests \
            CODE_SIGNING_ALLOWED=NO
