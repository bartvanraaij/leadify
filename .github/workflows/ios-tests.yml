name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select iPad simulator
        id: simulator
        run: |
          DEVICE_INFO=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if 'iPad' in d['name']:
                      # Extract OS version from runtime key, e.g. 'com.apple.CoreSimulator.SimRuntime.iOS-17-5'
                      version = runtime.split('iOS-')[-1].replace('-', '.') if 'iOS-' in runtime else runtime
                      print(f\"{d['name']}|{version}\")
                      sys.exit(0)
          print('No iPad simulator found', file=sys.stderr)
          sys.exit(1)
          ")
          IPAD_NAME=$(echo "$DEVICE_INFO" | cut -d'|' -f1)
          IOS_VERSION=$(echo "$DEVICE_INFO" | cut -d'|' -f2)
          echo "name=$IPAD_NAME" >> "$GITHUB_OUTPUT"
          echo "os=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "destination=platform=iOS Simulator,name=$IPAD_NAME,OS=$IOS_VERSION" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $IPAD_NAME (iOS $IOS_VERSION)"

      - name: Run unit tests
        run: |
          xcodebuild clean test \
            -scheme Leadify \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -only-testing:LeadifyTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Run UI tests
        # No 'clean' here — reuses the build artifact from the unit tests step
        run: |
          xcodebuild test \
            -scheme Leadify \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -only-testing:LeadifyUITests \
            CODE_SIGNING_ALLOWED=NO
