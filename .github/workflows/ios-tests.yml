name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-26
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run unit tests
        run: |
          xcodebuild clean test \
            -scheme Leadify \
            -destination 'platform=iOS Simulator,name=iPad (A16)' \
            -only-testing:LeadifyTests \
            CODE_SIGNING_ALLOWED=NO

