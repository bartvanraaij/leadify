name: iOS Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.swift', '**/*.xccodeproj', 'Leadify.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Run unit tests
        run: xcodebuild test -scheme Leadify -destination 'platform=iOS Simulator,name=iPad (A16)' -only-testing:LeadifyTests -skip-testing:LeadifyUITests CODE_SIGNING_ALLOWED=NO
