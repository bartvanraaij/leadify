name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          xcodebuild clean test \
            -scheme Leadify \
            -destination 'platform=iOS Simulator,name=iPad (A16)' \
            -only-testing:LeadifyTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Run UI tests
        # No 'clean' here — reuses the build artifact from the unit tests step
        run: |
          xcodebuild test \
            -scheme Leadify \
            -destination 'platform=iOS Simulator,name=iPad (A16)' \
            -only-testing:LeadifyUITests \
            CODE_SIGNING_ALLOWED=NO
