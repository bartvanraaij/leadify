<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#0D0D0F"/>
    </linearGradient>

    <!-- Warm orange spotlight glow behind notehead -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9900" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle drop shadow on the note -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20"
                    flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Orange glow centred on notehead -->
  <ellipse cx="500" cy="725" rx="240" ry="215" fill="url(#glow)"/>

  <!-- Quarter note: stem + notehead -->
  <g filter="url(#shadow)">
    <!-- Stem (rounded capsule) -->
    <rect x="598" y="200" width="32" height="538" rx="16" fill="white"/>
    <!-- Notehead (tilted ellipse, classic -22°) -->
    <ellipse cx="498" cy="725" rx="115" ry="80"
             transform="rotate(-22 498 725)" fill="white"/>
  </g>
</svg>
